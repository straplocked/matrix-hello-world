## Production compose for Unraid deployment
## Pulls pre-built image from GHCR instead of building locally
##
## Usage:
##   docker compose -f docker-compose.prod.yml pull
##   docker compose -f docker-compose.prod.yml up -d
##
## Auto-update: Watchtower will detect new :latest tags pushed by CI/CD

services:
  matrix-hello:
    image: ghcr.io/straplocked/matrix-hello-world:latest
    container_name: matrix-hello
    ports:
      - "0.0.0.0:3001:8080"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:uid=101,gid=101
      - /var/cache/nginx:uid=101,gid=101
      - /var/run:uid=101,gid=101
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      com.straplocked.app: "matrix-hello"
      com.straplocked.port: "3001"
      com.straplocked.domain: "wakeup.straplocked.com"
      com.centurylinklabs.watchtower.enable: "true"
