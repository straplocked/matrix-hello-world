services:
  matrix-hello:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: matrix-hello
    ports:
      - "0.0.0.0:3001:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      com.straplocked.app: "matrix-hello"
      com.straplocked.port: "3001"
