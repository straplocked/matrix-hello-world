services:
  matrix-hello:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: matrix-hello
    ports:
      - "192.168.1.76:3001:8080"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:uid=101,gid=101
      - /var/cache/nginx:uid=101,gid=101
      - /var/run:uid=101,gid=101
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      com.straplocked.app: "matrix-hello"
      com.straplocked.port: "3001"
