<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAKE UP // XION</title>
    <link rel="stylesheet" href="style.css?v=20260316a">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.11.0/mapbox-gl.css" rel="stylesheet">
</head>
<body class="booting">
    <!-- CRT Boot Sequence Overlay -->
    <div id="boot-screen"><div id="boot-line"></div><div id="boot-source"><a href="https://github.com/straplocked/matrix-hello-world" target="_blank" rel="noopener">github.com/straplocked/matrix-hello-world</a></div></div>

    <div id="scene">
        <!-- Deep background: matrix rain — barely moves -->
        <div class="parallax-layer" data-depth="0.10">
            <div id="matrix-bg"></div>
        </div>

        <!-- Mid layer: overlay text — subtle parallax -->
        <div class="parallax-layer" data-depth="0.20">
            <div id="overlay">
                <div id="hello-text">
                    <span class="bracket">[</span>
                    <div id="text-inner">
                        <div class="main-line">WAKE</div>
                        <div class="main-line">UP</div>
                    </div>
                    <span class="bracket">]</span>
                </div>
                <div id="subtitle">THE SYSTEM SEES YOU</div>
                <div id="typewriter"></div>
            </div>
        </div>

        <!-- Screen flash — doesn't move -->
        <div class="parallax-layer" data-depth="0.0">
            <div id="screen-flash"></div>
        </div>

        <!-- Scanlines — very subtle movement -->
        <div class="parallax-layer" data-depth="0.03">
            <div id="scanlines"></div>
        </div>
    </div>

    <!-- CRT TV Frame Overlay -->
    <div id="crt-frame">
        <div id="crt-bezel-shine"></div>
        <div id="crt-power-led"></div>
    </div>
    <div id="scanline-sweep"></div>

    <!-- Interaction hints -->
    <div id="hints">
        <span>click: ripple</span>
        <span>double-click: burst</span>
        <span>hold: freeze</span>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/parallax/3.1.0/parallax.min.js"></script>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.11.0/mapbox-gl.js"></script>
    <script src="main.js?v=20260316a"></script>
</body>
</html>
